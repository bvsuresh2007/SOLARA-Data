name: Price Tracker — Daily

on:
  schedule:
    - cron: "30 2 * * *"   # 08:00 AM IST daily (UTC+5:30)
  workflow_dispatch:
    inputs:
      report_date:
        description: "Date to scrape prices for (YYYY-MM-DD). Defaults to today."
        required: false
        default: ""

jobs:
  price-tracker:
    name: Run Price Tracker
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r scrapers/tools/price_tracker/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Restore Google token
        run: echo "${{ secrets.GOOGLE_TOKEN_JSON }}" | base64 -d > token.json

      - name: Run Price Tracker
        env:
          PRICE_TRACKER_SHEET_ID: ${{ secrets.PRICE_TRACKER_SHEET_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          INPUT_REPORT_DATE: ${{ github.event.inputs.report_date }}
        run: python -m scrapers.tools.price_tracker.run

      - name: Slack alert on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \":x: *Price Tracker failed* \u2014 <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
